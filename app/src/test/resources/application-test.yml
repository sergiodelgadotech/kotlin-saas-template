spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///saastemplate_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  data:
    redis:
      url: redis://localhost:6379

saasstarter:
  security:
    jwks-url: https://test.clerk.accounts.dev/.well-known/jwks.json
    issuer: https://test.clerk.accounts.dev
  billing:
    api-key: sk_test_dummy_for_tests
    webhook-secret: whsec_dummy
    success-url: http://localhost:8080/billing?success=true
    cancel-url: http://localhost:8080/billing
    portal-return-url: http://localhost:8080/billing
    plan-prices:
      STARTER: price_test_starter
      PRO: price_test_pro

resend:
  api-key: re_test_dummy

sentry:
  dsn:

app:
  base-url: http://localhost:8080

logging:
  level:
    tech.sergiodelgado.saastemplate: WARN

jobrunr:
  background-job-server:
    enabled: false
  dashboard:
    enabled: false
