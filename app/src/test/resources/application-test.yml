spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///saastemplate_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      # Limit pool size so the shared TC postgres container (default max_connections=100)
      # isn't exhausted when many Spring contexts are alive in the same test JVM.
      maximum-pool-size: 3
      minimum-idle: 1
  flyway:
    enabled: true
  data:
    redis:
      url: redis://localhost:6379

saasstarter:
  security:
    jwks-url: http://localhost:8089/oauth/v2/keys
    issuer: http://localhost:8089
  billing:
    api-key: sk_test_dummy_for_tests
    webhook-secret: whsec_dummy
    success-url: http://localhost:8080/billing?success=true
    cancel-url: http://localhost:8080/billing
    portal-return-url: http://localhost:8080/billing
    plan-prices:
      STARTER: price_test_starter
      PRO: price_test_pro
  email:
    api-key: re_test_dummy
    from-address: no-reply@test.example.com

sentry:
  dsn:

app:
  base-url: http://localhost:8080

logging:
  level:
    tech.sergiodelgado.saastemplate: WARN

jobrunr:
  background-job-server:
    enabled: false
  dashboard:
    enabled: false
