<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/onboarding}">
<head><title>Choose your plan</title></head>
<body>
<div layout:fragment="content">
    <div class="max-w-2xl mx-auto mt-12">
        <h1 class="text-2xl font-bold mb-2">Choose your plan</h1>
        <p class="text-base-content/60 mb-8">Pick a plan to get started. You can upgrade or change at any time.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <!-- Starter card (always STARTER) — permanently free tier -->
            <div class="card bg-base-100 shadow-sm border border-base-200">
                <div class="card-body">
                    <h2 class="card-title">Starter</h2>
                    <p class="text-3xl font-bold mt-1">€0<span class="text-base font-normal text-base-content/60">/mo forever</span></p>
                    <ul class="mt-4 space-y-2 text-sm">
                        <li>&#10003; Up to 5 users</li>
                        <li>&#10003; 1 GB storage</li>
                        <li>&#10003; Community support</li>
                    </ul>
                    <div class="card-actions mt-4">
                        <form th:action="@{/onboarding/plan}" method="post" class="w-full">
                            <input type="hidden" name="plan" th:value="${starterPlan}">
                            <button class="btn btn-outline w-full" type="submit">Continue with Starter</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Pro card -->
            <div th:each="plan : ${plans}" th:if="${plan != starterPlan}"
                 class="card bg-base-100 shadow-sm border-2 border-primary">
                <div class="card-body">
                    <h2 class="card-title" th:text="${plan}">PRO</h2>
                    <p class="text-3xl font-bold mt-1">€79<span class="text-base font-normal text-base-content/60">/mo</span></p>
                    <ul class="mt-4 space-y-2 text-sm">
                        <li>&#10003; Unlimited users</li>
                        <li>&#10003; 100 GB storage</li>
                        <li>&#10003; Priority support</li>
                    </ul>
                    <div class="card-actions mt-4">
                        <form th:action="@{/onboarding/plan}" method="post" class="w-full">
                            <input type="hidden" name="plan" th:value="${plan}">
                            <button class="btn btn-primary w-full" type="submit"
                                    th:text="'Start with ' + ${plan}">Start with PRO</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
