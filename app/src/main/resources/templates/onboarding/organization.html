<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/onboarding}">
<head><title>Create your organization</title></head>
<body>
<div layout:fragment="content">
    <div class="max-w-lg mx-auto mt-12">
        <div class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <h1 class="card-title text-2xl mb-2">Create your organization</h1>
                <p class="text-base-content/60 mb-6">You're almost in. Give your workspace a name to get started.</p>

                <form th:action="@{/onboarding/organization}" method="post">
                    <fieldset class="fieldset mb-6">
                        <legend class="fieldset-legend">Organization name</legend>
                        <input class="input input-bordered w-full"
                               type="text"
                               id="org-name"
                               name="name"
                               list="org-suggestions"
                               th:value="${suggestions != null && !suggestions.isEmpty() ? suggestions.get(0) : ''}"
                               placeholder="Acme Inc."
                               autofocus
                               required>
                        <datalist id="org-suggestions" th:if="${suggestions != null && !suggestions.isEmpty()}">
                            <option th:each="suggestion : ${suggestions}" th:value="${suggestion}"/>
                        </datalist>
                    </fieldset>
                    <div class="card-actions">
                        <button class="btn btn-primary w-full" type="submit" id="org-submit" disabled>Create organization</button>
                    </div>
                </form>
                <script>
                    (function () {
                        var input = document.getElementById('org-name');
                        var button = document.getElementById('org-submit');
                        var sync = function () { button.disabled = input.value.trim().length === 0; };
                        input.addEventListener('input', sync);
                        sync();
                    })();
                </script>
            </div>
        </div>
    </div>
</div>
</body>
</html>
