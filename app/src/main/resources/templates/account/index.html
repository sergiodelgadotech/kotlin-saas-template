<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Account</title></head>
<body>
<div layout:fragment="content">
    <div class="max-w-lg">
        <h1 class="text-2xl font-bold mb-6">Account</h1>

        <div class="card bg-base-100 shadow-sm mb-6">
            <div class="card-body">
                <h2 class="card-title mb-4">Display name</h2>
                <form th:action="@{/account}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <fieldset class="fieldset">
                            <legend class="fieldset-legend">First name</legend>
                            <input class="input input-bordered w-full"
                                   type="text"
                                   name="firstName"
                                   th:value="${firstName}"
                                   required>
                        </fieldset>
                        <fieldset class="fieldset">
                            <legend class="fieldset-legend">Last name</legend>
                            <input class="input input-bordered w-full"
                                   type="text"
                                   name="lastName"
                                   th:value="${lastName}"
                                   required>
                        </fieldset>
                    </div>
                    <fieldset class="fieldset mb-6">
                        <legend class="fieldset-legend">Email</legend>
                        <input class="input input-bordered w-full"
                               type="email"
                               th:value="${email}"
                               disabled>
                    </fieldset>
                    <div class="card-actions">
                        <button class="btn btn-primary" type="submit">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-2">Security</h2>
                <p class="text-base-content/60 mb-4">Password and multi-factor authentication are managed through your identity provider.</p>
                <a th:href="${idpProfileUrl}" target="_blank" rel="noopener" class="btn btn-outline btn-sm w-fit">
                    Manage password &amp; MFA ↗
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
