<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Settings</title></head>
<body>
<div layout:fragment="content">
    <h1 class="text-2xl font-bold mb-8">Organization Settings</h1>

    <div class="card bg-base-100 shadow-sm max-w-lg">
        <div class="card-body">
            <form th:action="@{/organization/settings}" method="post">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">Organization name</span></label>
                    <input class="input input-bordered"
                           type="text"
                           name="name"
                           th:value="${organization.name}"
                           required>
                </div>
                <div class="form-control mb-2">
                    <label class="label"><span class="label-text">Slug</span></label>
                    <input class="input input-bordered input-disabled"
                           type="text"
                           th:value="${organization.slug}"
                           disabled>
                    <label class="label">
                        <span class="label-text-alt text-base-content/50">Cannot be changed after creation</span>
                    </label>
                </div>
                <div class="card-actions mt-4">
                    <button class="btn btn-primary" type="submit">Save changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
