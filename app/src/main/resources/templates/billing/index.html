<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Billing</title>
</head>
<body>
<div layout:fragment="content">
    <h1 class="text-2xl font-bold mb-8">Billing</h1>

    <!-- No subscription -->
    <div th:if="${subscription == null}" class="alert alert-info mb-8">
        <span>No active subscription found. Contact support to get started.</span>
    </div>

    <!-- Starter: side-by-side plan cards -->
    <div th:if="${subscription != null and subscription.plan == 'STARTER'}" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <div class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <div class="flex items-center gap-2">
                    <h2 class="card-title">Starter</h2>
                    <span class="badge badge-neutral">Current plan</span>
                </div>
                <p class="text-3xl font-bold mt-1">€0<span class="text-base font-normal text-base-content/60">/mo forever</span></p>
                <ul class="mt-4 space-y-2 text-sm">
                    <li>&#10003; Up to 5 users</li>
                    <li>&#10003; 1 GB storage</li>
                    <li>&#10003; Community support</li>
                </ul>
            </div>
        </div>

        <div class="card bg-base-100 shadow-sm border-2 border-primary">
            <div class="card-body">
                <h2 class="card-title">Pro</h2>
                <p class="text-3xl font-bold">€79<span class="text-base font-normal text-base-content/60">/mo</span></p>
                <ul class="mt-4 space-y-2 text-sm">
                    <li>&#10003; Unlimited users</li>
                    <li>&#10003; 100 GB storage</li>
                    <li>&#10003; Priority support</li>
                </ul>
                <div class="card-actions mt-4">
                    <form th:action="@{/billing/checkout}" method="post">
                        <input type="hidden" name="plan" value="PRO">
                        <button class="btn btn-primary">Upgrade to Pro</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Paid plan: single card with name, status badge and renewal date -->
    <div th:if="${subscription != null and subscription.plan != 'STARTER'}" class="card bg-base-100 shadow-sm mb-8">
        <div class="card-body">
            <div class="flex items-center gap-2">
                <h2 class="card-title" th:text="${subscription.plan}">PRO</h2>
                <span class="badge badge-neutral">Current plan</span>
                <span class="badge"
                      th:classappend="${subscription.status == 'ACTIVE'} ? 'badge-success' : 'badge-warning'"
                      th:text="${subscription.status}">ACTIVE</span>
            </div>
            <p class="text-base-content/60" th:if="${subscription.currentPeriodEnd}">
                Renews <span th:text="${#temporals.format(subscription.currentPeriodEnd, 'dd MMM yyyy')}"></span>
            </p>
            <div class="card-actions mt-4">
                <form th:action="@{/billing/portal}" method="post">
                    <button class="btn btn-outline btn-sm">Manage Subscription</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
