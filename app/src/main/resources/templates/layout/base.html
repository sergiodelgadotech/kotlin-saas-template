<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE — Kotlin SaaS Template">Kotlin SaaS Template</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-base-200 min-h-screen">

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 p-8">
        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success mb-4">
            <span th:text="${success}"></span>
            <button class="ml-auto btn btn-ghost btn-xs btn-circle" onclick="this.closest('.alert').remove()" aria-label="Dismiss">
                <svg th:replace="~{fragments/icons :: x-mark('size-4')}"></svg>
            </button>
        </div>
        <div th:if="${error}" class="alert alert-error mb-4">
            <span th:text="${error}"></span>
            <button class="ml-auto btn btn-ghost btn-xs btn-circle" onclick="this.closest('.alert').remove()" aria-label="Dismiss">
                <svg th:replace="~{fragments/icons :: x-mark('size-4')}"></svg>
            </button>
        </div>

        <div layout:fragment="content"></div>
    </main>
</div>

<script th:src="@{/js/htmx.min.js}"></script>
<script th:src="@{/js/htmx-sse.js}"></script>
</body>
</html>
