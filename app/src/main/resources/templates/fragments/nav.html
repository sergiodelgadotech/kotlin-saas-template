<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="nav" class="navbar bg-base-100 border-b border-base-300 px-6">
    <div class="flex-1">
        <a href="/dashboard" class="text-lg font-bold">Kotlin SaaS Template</a>
    </div>
    <div class="flex-none gap-2">
        <div sec:authorize="isAuthenticated()" class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar" aria-label="User menu">
                <div class="w-8 rounded-full bg-primary text-primary-content flex items-center justify-center">
                    <span class="text-sm font-bold" th:text="${navInitials}">?</span>
                </div>
            </div>
            <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-56 p-2 shadow">
                <li class="menu-title px-2 py-1">
                    <span class="text-sm font-semibold" th:text="${navDisplayName}">User</span>
                    <span class="text-xs text-base-content/60" th:text="${navEmail}"></span>
                </li>
                <li class="divider my-1"></li>
                <li><a href="/account">Account</a></li>
                <li><a href="/organization/settings">Settings</a></li>
                <li><a href="/billing">Billing</a></li>
                <li>
                    <form th:action="@{/sign-out}" method="post" class="m-0">
                        <button type="submit" class="w-full text-left">Sign out</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
