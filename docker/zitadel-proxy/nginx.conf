# Host-rewriting reverse proxy in front of Zitadel.
#
# Zitadel resolves the instance from the request's Host *domain* (the port is
# ignored for matching: localhost, localhost:8089 and localhost:8080 all match;
# "zitadel" does not — it returns 404). The zitadel-login container can only reach
# Zitadel over the Docker bridge as `zitadel:8080`, which would send
# `Host: zitadel:8080` and 404. This proxy forwards bridge traffic to Zitadel
# while rewriting the Host to the external authority `localhost:8089`, so login
# (and anything else on the bridge) can talk to Zitadel.
#
# The full `localhost:8089` (with port) matters: Zitadel echoes the request Host
# into generated URLs (issuer, authorization/token endpoints), so a bare
# `localhost` would yield `http://localhost` (port 80) and break the published
# port the browser uses.
#
# Why this exists: inside an sbx microVM `network_mode: host` is not honored, so
# the login container can't reach Zitadel on the host's published localhost:8089.
# Routing it over the bridge through this proxy works on plain Docker/Podman and
# inside sbx alike.
server {
    listen 8080;

    # Docker's embedded DNS. Resolving the upstream via a variable defers lookup
    # to request time, so this proxy doesn't crash if Zitadel isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $zitadel_upstream zitadel:8080;
        proxy_pass http://$zitadel_upstream;
        proxy_set_header Host localhost:8089;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
