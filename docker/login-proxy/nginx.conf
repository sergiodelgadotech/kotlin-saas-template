# Reverse proxy that sits in front of zitadel-login on port 3000.
#
# Problem: with login v2 enabled, Zitadel v4 constructs the external IDP
# callback URL from the host:port of LOGINV2_BASEURI (http://localhost:3000)
# rather than its own external domain (localhost:8089).  It sends Google
# redirect_uri=http://localhost:3000/idps/callback.  But the /idps/callback
# handler lives in Zitadel core — the login v2 Next.js app has no such route
# (its IDP pages are at /idp/[provider]/process after Zitadel completes the
# OAuth exchange).
#
# Solution: proxy /idps/callback transparently to Zitadel core, exactly like
# zitadel-proxy does for internal bridge traffic.  Zitadel processes the OAuth
# response and redirects the browser to the login UI (/idp/[provider]/process).
# All other browser traffic is forwarded to the login app (port 3001).
#
#   browser → localhost:3000/idps/callback?code=...&state=...
#             → (proxy, Host: localhost:8089) zitadel:8080/idps/callback
#             → Zitadel processes callback, redirects to login UI  ✓
#
#   browser → localhost:3000/ui/v2/login/login?authRequest=...
#             → zitadel-login:3001  ✓
server {
    listen 80;

    # IDP OAuth callback: belongs to Zitadel core, not the login UI.
    # Rewrite the Host so Zitadel resolves the correct instance (same reason
    # zitadel-proxy exists for internal bridge traffic).
    location = /idps/callback {
        proxy_pass http://zitadel:8080;
        proxy_set_header Host localhost:8089;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://zitadel-login:3001;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
