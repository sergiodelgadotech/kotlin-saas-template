# Browser-facing reverse proxy on port 3000.
#
# LOGINV2_BASEURI is set to http://localhost:3000/ui/v2/login/, which means
# Zitadel advertises http://localhost:3000/idps/callback as the OAuth2
# redirect_uri when starting IDP flows (StartIdentityProviderIntent runs at
# instance_host=localhost:3000). The login v2 Next.js app has no /idps/callback
# handler, so this proxy intercepts that path and forwards it to Zitadel core.
#
# IMPORTANT: the Host must be localhost:3000 (not :8089) so the redirect_uri
# Zitadel constructs for the token exchange matches the one it sent to Google
# during the authorization request. Zitadel resolves the instance by domain
# only (port is ignored for instance matching), so :3000 still resolves
# correctly. Using :8089 here would cause Zitadel to send a different
# redirect_uri to Google's token endpoint → invalid_grant.
#
# All other traffic goes to the login UI (zitadel-login on port 3001).
server {
    listen 3000;

    location = /idps/callback {
        proxy_pass http://zitadel:8080;
        proxy_set_header Host localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://zitadel-login:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
