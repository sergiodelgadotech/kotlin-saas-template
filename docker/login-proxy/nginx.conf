# Path-rewriting reverse proxy in front of zitadel-login.
#
# Zitadel v4 constructs the external IDP callback URL from only the host:port
# of LOGINV2_BASEURI, ignoring the path component.  With LOGINV2_BASEURI set
# to http://localhost:3000/ui/v2/login/, Zitadel sends Google (and every other
# external IDP) redirect_uri=http://localhost:3000/idps/callback — but the
# zitadel-login Next.js app serves the callback handler under its basePath at
# /ui/v2/login/idps/callback.  This proxy bridges the gap:
#
#   browser → localhost:3000/idps/callback
#             → (rewrite) /ui/v2/login/idps/callback
#             → zitadel-login:3001/ui/v2/login/idps/callback  ✓
#
# All other browser traffic (login form, logout, assets) is forwarded unchanged.
#
# Why a separate proxy instead of modifying zitadel-proxy: that proxy targets
# Zitadel core (port 8089) and exists to rewrite the Host header for bridge
# clients.  This proxy targets the login UI (port 3000) and exists to rewrite
# the path for browser callbacks.  Separate concerns, separate services.
server {
    listen 80;

    # Rewrite the IDP callback from the root path to the login v2 base path.
    # nginx preserves the query string (?state=...&code=...) by default when
    # the replacement does not end with `?`, so the IDP state round-trips fine.
    location = /idps/callback {
        rewrite ^ /ui/v2/login/idps/callback last;
    }

    location / {
        proxy_pass http://zitadel-login:3001;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
