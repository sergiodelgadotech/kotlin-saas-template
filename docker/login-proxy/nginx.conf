# Browser-facing reverse proxy on port 3000.
#
# LOGINV2_BASEURI is set to http://localhost:3000/ui/v2/login/, which means
# Zitadel advertises http://localhost:3000/idps/callback as the OAuth2
# redirect_uri when starting IDP flows. The login v2 Next.js app has no
# /idps/callback handler, so this proxy intercepts that path and forwards
# it to Zitadel core directly.
#
# Host: localhost:8089 is the external authority Zitadel's instance
# resolver requires (same reason zitadel-proxy uses it). The port matters
# because Zitadel echoes the Host into generated redirect URLs.
#
# All other traffic goes to the login UI (zitadel-login on port 3001).
server {
    listen 3000;

    location = /idps/callback {
        proxy_pass http://zitadel:8080;
        proxy_set_header Host localhost:8089;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://zitadel-login:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
