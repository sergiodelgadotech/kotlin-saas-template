# Overrides the default HTTPClient.DenyList to allow Zitadel v2 action webhooks to call
# Docker-internal services (172.x.x.x / 10.x.x.x). In production, do NOT remove these
# ranges; the webhook target should use a real external URL instead.
HTTPClient:
  DenyList:
    - localhost
    - "0.0.0.0/8"
    - "127.0.0.0/8"
    - "169.254.0.0/16"
    - "192.168.0.0/16"
    - "198.18.0.0/15"
    - "::/128"
    - "::1/128"
    - "fc00::/7"
    - "fe80::/10"
