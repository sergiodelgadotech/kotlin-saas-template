services:
  dev:
    image: mcr.microsoft.com/devcontainers/java:25
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/saastemplate
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
