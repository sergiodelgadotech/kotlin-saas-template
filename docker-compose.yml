services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: saastemplate
      POSTGRES_USER: saastemplate
      POSTGRES_PASSWORD: saastemplate
    ports:
    - 5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U saastemplate
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8-alpine
    ports:
    - 6379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 5s
      retries: 5
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.3
    user: root
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Chars!!!!!" --tlsMode disabled --config /zitadel-setup/setup.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: saastemplate
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: saastemplate
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: saastemplate
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: saastemplate
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8089
      ZITADEL_EXTERNALIP: 127.0.0.1
      ZITADEL_FIRSTINSTANCE_ORG_NAME: ZITADEL
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-init-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Init Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINEKEY_TYPE: 1
      ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH: /zitadel-keys/zitadel-init-sa.json
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel-bootstrap/login-client.pat
      # LOGINV2_BASEURI must point at Zitadel's own external domain, not the
      # login UI host. Zitadel uses this URI's host:port to construct the OAuth
      # redirect_uri it sends to external IDPs (Google, GitHub, etc.), and it
      # uses the same domain when calling the provider's token endpoint. Both
      # sides of the exchange must agree on the same URI or Google returns
      # invalid_grant. DEFAULTLOGINURLV2 (below) controls where users are
      # redirected for the actual login UI — that still points at port 3000.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:8089/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:3000/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:3000/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://localhost:3000/ui/v2/login/login?samlRequest=
    ports:
    - 8089:8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - ./docker/zitadel-init/setup.yaml:/zitadel-setup/setup.yaml:ro,z
    - zitadel-init-keys:/zitadel-keys
    - zitadel-bootstrap:/zitadel-bootstrap
  # Host-rewriting reverse proxy so bridge clients (zitadel-login) can reach
  # Zitadel with a Host the instance accepts. See docker/zitadel-proxy/nginx.conf.
  zitadel-proxy:
    image: nginx:alpine
    volumes:
    - ./docker/zitadel-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    depends_on:
    - zitadel
    restart: unless-stopped
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:latest
    # Runs on the Docker bridge (not network_mode: host) so it works inside an sbx
    # microVM, where host networking is not honored and the login container can't
    # reach Zitadel's published localhost:8089. It talks to Zitadel through
    # zitadel-proxy, which rewrites the Host header the instance requires. Port 3000
    # is published for the browser; it was implicitly host-exposed before.
    environment:
      ZITADEL_API_URL: http://zitadel-proxy:8080
      ZITADEL_SERVICE_USER_TOKEN_FILE: /bootstrap/login-client.pat
      ZITADEL_TLS_ENABLED: 'false'
      PORT: 3000
    ports:
    - 3000:3000
    volumes:
    - zitadel-bootstrap:/bootstrap:ro
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
      zitadel-proxy:
        condition: service_started
    restart: unless-stopped
    # Override the image's default healthcheck so it probes the liveness endpoint
    # via the numeric loopback. The default probes `localhost` + the readiness
    # endpoint; pinning the IP avoids any DNS edge cases and liveness keeps the
    # gate from depending on Zitadel being reachable at the moment Compose checks.
    healthcheck:
      test:
      - CMD
      - /usr/local/bin/node
      - /app/healthcheck.mjs
      - http://127.0.0.1:3000/ui/v2/login/healthy
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
  zitadel-init:
    image: python:3.14-alpine
    command: sh -c "pip install cryptography -q && python /scripts/init.py"
    environment:
      # ZITADEL_URL is the external/public URL — used for the JWT audience and the
      # `Host` header Zitadel's vhost routing requires. ZITADEL_CONNECT_URL is the
      # actual TCP target: the Docker bridge service name. Connecting over the bridge
      # (instead of `network_mode: host` + localhost:8089) is the only thing that works
      # inside an sbx microVM, where host networking is not honored, and it works
      # identically on plain Docker/Podman. See docker/zitadel-init/scripts/init.py.
      ZITADEL_URL: http://localhost:8089
      ZITADEL_CONNECT_URL: http://zitadel:8080
      KEY_FILE_PATH: /keys/zitadel-init-sa.json
      OUTPUT_FILE: /output/.local-client.properties
      MGMT_PAT_FILE: /output/management-api.pat
      MGMT_PROPS_FILE: /output/.local-management.properties
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_ADDRESS: ${RESEND_FROM_ADDRESS:-}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-}
      ZITADEL_DEV_GOOGLE_CLIENT_ID: ${ZITADEL_DEV_GOOGLE_CLIENT_ID:-}
      ZITADEL_DEV_GOOGLE_CLIENT_SECRET: ${ZITADEL_DEV_GOOGLE_CLIENT_SECRET:-}
      ZITADEL_DEV_GITHUB_CLIENT_ID: ${ZITADEL_DEV_GITHUB_CLIENT_ID:-}
      ZITADEL_DEV_GITHUB_CLIENT_SECRET: ${ZITADEL_DEV_GITHUB_CLIENT_SECRET:-}
      ZITADEL_DEV_MICROSOFT_CLIENT_ID: ${ZITADEL_DEV_MICROSOFT_CLIENT_ID:-}
      ZITADEL_DEV_MICROSOFT_CLIENT_SECRET: ${ZITADEL_DEV_MICROSOFT_CLIENT_SECRET:-}
      ZITADEL_DEV_MICROSOFT_TENANT: ${ZITADEL_DEV_MICROSOFT_TENANT:-}
      ZITADEL_DEV_APPLE_CLIENT_ID: ${ZITADEL_DEV_APPLE_CLIENT_ID:-}
      ZITADEL_DEV_APPLE_TEAM_ID: ${ZITADEL_DEV_APPLE_TEAM_ID:-}
      ZITADEL_DEV_APPLE_KEY_ID: ${ZITADEL_DEV_APPLE_KEY_ID:-}
      ZITADEL_DEV_APPLE_PRIVATE_KEY: ${ZITADEL_DEV_APPLE_PRIVATE_KEY:-}
    volumes:
    - zitadel-init-keys:/keys:ro
    - ./docker/zitadel-init/scripts:/scripts:ro,z
    - ./docker/zitadel-init:/output:z
    depends_on:
    - zitadel
    restart: no
volumes:
  postgres_data: null
  zitadel-init-keys: null
  zitadel-bootstrap: null
