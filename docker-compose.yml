services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: saastemplate
      POSTGRES_USER: saastemplate
      POSTGRES_PASSWORD: saastemplate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saastemplate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Zitadel — identity provider
  # Start with: docker compose --profile auth up -d
  # Admin UI: http://localhost:8089/ui/console
  # Default credentials: zitadel-admin@zitadel.localhost / Password1!
  # Not started by ./gradlew bootRun — LocalDevAuthFilter handles auth in local profile.
  zitadel:
    profiles: [auth]
    image: ghcr.io/zitadel/zitadel:v4.15.1
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Chars!!" --tlsMode disabled --config /zitadel-setup/setup.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: saastemplate
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: saastemplate
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: saastemplate
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: saastemplate
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8089
      ZITADEL_EXTERNALIP: 127.0.0.1
      ZITADEL_MACHINE_KEY_PATH: /zitadel-keys/
    ports:
      - "8089:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/debug/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    volumes:
      - ./docker/zitadel-init/setup.yaml:/zitadel-setup/setup.yaml:ro
      - zitadel-init-keys:/zitadel-keys

  zitadel-init:
    profiles: [auth]
    image: python:3.13-alpine
    command: sh -c "pip install --quiet --no-cache-dir requests 2>/dev/null; python /scripts/init.py"
    environment:
      ZITADEL_URL: http://zitadel:8080
      KEY_FILE_PATH: /keys/zitadel-init-sa.json
      OUTPUT_FILE: /output/.local-client-id
    volumes:
      - zitadel-init-keys:/keys:ro
      - ./docker/zitadel-init/scripts:/scripts:ro
      - ./docker/zitadel-init:/output
    depends_on:
      zitadel:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  zitadel-init-keys:
